name: Benchmark history

# Records benchmark results from the existing C++ Catch2 and Python
# pytest-benchmark suites and appends them to gh-pages under bench/cpp
# and bench/python. Each path hosts a Chart.js viewer rendered by
# benchmark-action/github-action-benchmark.
#
# Triggers: daily at 06:17 UTC and on manual dispatch. Not run on PRs.
# Scope is record-only — no alerts, no PR comments, no CI failures on
# regression. See docs/development/benchmark-history.md.

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * *'

permissions:
  contents: write

concurrency:
  # Share the gh-pages-writer group with docs.yml, release.yml, and the
  # PR preview workflow so scheduled bench runs cannot race a mike push.
  group: docs-deploy
  cancel-in-progress: false

jobs:
  bench-cpp:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CMAKE_BUILD_TYPE: Release
      CLIFFT_CPU_BASELINE: x86-64-v2
      CMAKE_GENERATOR: Ninja
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Print runner CPU info
        run: |
          echo "--- lscpu ---"
          lscpu
          echo "--- /proc/cpuinfo flags ---"
          grep -m1 '^flags' /proc/cpuinfo | cut -d: -f2- | tr ' ' '\n' | sed '/^$/d' | sort -u | tr '\n' ' '
          echo

      - name: Check benchmark CPU mode flags
        id: cpu_modes
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          flags = set()
          for line in Path("/proc/cpuinfo").read_text().splitlines():
              if line.startswith("flags"):
                  flags = set(line.split(":", 1)[1].split())
                  break

          modes = {
              "avx2": [{"avx2"}, {"bmi2"}, {"fma"}],
              "avx512": [{"avx2"}, {"bmi2"}, {"fma"}, {"avx512f"}, {"avx512dq"}],
          }
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              for mode, required in modes.items():
                  missing = ["|".join(sorted(g)) for g in required if not (g & flags)]
                  supported = not missing
                  if missing:
                      print(f"::notice::Skipping {mode} benchmarks; missing CPU flags: {' '.join(missing)}")
                  fh.write(f"{mode}={str(supported).lower()}\n")
          PY

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-bench-${{ env.CMAKE_BUILD_TYPE }}-${{ env.CLIFFT_CPU_BASELINE }}

      - name: Configure C++ build
        # Pin the global baseline to match Linux x86_64 release wheels. The
        # high-ISA SVM kernels are still benchmarked explicitly below when
        # the runner CPU supports them.
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DCLIFFT_CPU_BASELINE=${{ env.CLIFFT_CPU_BASELINE }}

      - name: Build benchmark binary
        run: cmake --build build --target clifft_tests --parallel

      - name: Audit benchmark build flags
        run: |
          python3 tools/ci/audit_build_flags.py \
            --compile-commands build/compile_commands.json

      - name: Run Catch2 benchmarks (scalar)
        # Action parser requires the console reporter (XML is not yet
        # supported by benchmark-action/github-action-benchmark@v1).
        env:
          CLIFFT_FORCE_ISA: scalar
        run: |
          build/tests/clifft_tests "[bench]" \
            --reporter console \
            --out cpp-bench-scalar.txt

      - name: Publish scalar C++ benchmarks to gh-pages
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: C++ Catch2 benchmarks (scalar)
          tool: catch2
          output-file-path: cpp-bench-scalar.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: bench/cpp-scalar
          auto-push: true
          # Record-only mode: alerts and comments are out of scope per #38.
          alert-threshold: '200%'
          fail-on-alert: false
          comment-on-alert: false

      - name: Run Catch2 benchmarks (AVX2)
        if: steps.cpu_modes.outputs.avx2 == 'true'
        env:
          CLIFFT_FORCE_ISA: avx2
        run: |
          build/tests/clifft_tests "[bench]" \
            --reporter console \
            --out cpp-bench-avx2.txt

      - name: Publish AVX2 C++ benchmarks to gh-pages
        if: steps.cpu_modes.outputs.avx2 == 'true'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: C++ Catch2 benchmarks (AVX2)
          tool: catch2
          output-file-path: cpp-bench-avx2.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: bench/cpp-avx2
          auto-push: true
          alert-threshold: '200%'
          fail-on-alert: false
          comment-on-alert: false

      - name: Run Catch2 benchmarks (AVX-512)
        if: steps.cpu_modes.outputs.avx512 == 'true'
        env:
          CLIFFT_FORCE_ISA: avx512
        run: |
          build/tests/clifft_tests "[bench]" \
            --reporter console \
            --out cpp-bench-avx512.txt

      - name: Publish AVX-512 C++ benchmarks to gh-pages
        if: steps.cpu_modes.outputs.avx512 == 'true'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: C++ Catch2 benchmarks (AVX-512)
          tool: catch2
          output-file-path: cpp-bench-avx512.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: bench/cpp-avx512
          auto-push: true
          alert-threshold: '200%'
          fail-on-alert: false
          comment-on-alert: false

  bench-python:
    # Wait for bench-cpp before pushing so the two jobs don't race each
    # other on gh-pages. `always() && !cancelled()` keeps the "a C++
    # failure doesn't gate Python history" property intact (Python runs
    # even if bench-cpp failed) while honoring explicit workflow
    # cancellation -- a bare `always()` would publish data even on a
    # cancelled run.
    needs: bench-cpp
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CLIFFT_CPU_BASELINE: x86-64-v2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-bench-python-${{ env.CLIFFT_CPU_BASELINE }}

      - name: Setup uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install Python package
        env:
          SKBUILD_CMAKE_BUILD_TYPE: Release
        run: uv sync --locked

      - name: Run pytest-benchmark suite
        run: |
          uv run --locked pytest tools/bench/ \
            --benchmark-only \
            --benchmark-json=python-bench.json

      - name: Publish to gh-pages
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Python pytest-benchmark suite
          tool: pytest
          output-file-path: python-bench.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: bench/python
          auto-push: true
          alert-threshold: '200%'
          fail-on-alert: false
          comment-on-alert: false
