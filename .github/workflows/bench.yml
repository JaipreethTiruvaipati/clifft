name: Benchmark history

# Records benchmark results from the existing C++ Catch2 and Python
# pytest-benchmark suites and appends them to gh-pages under bench/cpp
# and bench/python. Each path hosts a Chart.js viewer rendered by
# benchmark-action/github-action-benchmark.
#
# Triggers: daily at 06:17 UTC and on manual dispatch. Not run on PRs.
# Scope is record-only — no alerts, no PR comments, no CI failures on
# regression. See docs/development/benchmark-history.md.

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * *'

permissions:
  contents: write

concurrency:
  # Share the gh-pages-writer group with docs.yml, release.yml, and the
  # PR preview workflow so scheduled bench runs cannot race a mike push.
  group: docs-deploy
  cancel-in-progress: false

jobs:
  bench-cpp:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CMAKE_BUILD_TYPE: Release
      CMAKE_GENERATOR: Ninja
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Print runner CPU info
        run: |
          echo "--- lscpu ---"
          lscpu
          echo "--- /proc/cpuinfo flags ---"
          grep -m1 '^flags' /proc/cpuinfo | cut -d: -f2- | tr ' ' '\n' | sed '/^$/d' | sort -u | tr '\n' ' '
          echo

      - name: Check x86-64-v3 benchmark CPU flags
        id: cpu_check
        # The required-feature list has one vendor split: LZCNT is reported
        # as `lzcnt` on Intel but as `abm` (Advanced Bit Manipulation) on
        # AMD even though both provide the same instruction. Express each
        # feature as a set of acceptable flag names so AMD runners (e.g.
        # AMD EPYC 7763, which GitHub's hosted pool routinely assigns)
        # don't get spuriously skipped.
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          flags = set()
          for line in Path("/proc/cpuinfo").read_text().splitlines():
              if line.startswith("flags"):
                  flags = set(line.split(":", 1)[1].split())
                  break

          required = [
              {"avx"}, {"avx2"}, {"bmi1"}, {"bmi2"}, {"f16c"}, {"fma"},
              {"lzcnt", "abm"},
              {"movbe"}, {"sse4_2"}, {"xsave"},
          ]
          missing = ["|".join(sorted(g)) for g in required if not (g & flags)]
          if missing:
              names = " ".join(missing)
              print(
                  f"::warning::Runner CPU lacks expected x86-64-v3 benchmark "
                  f"flag(s): {names}. Skipping bench-cpp."
              )
              with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
                  fh.write("skip=true\n")
          PY

      - name: Setup ccache
        if: steps.cpu_check.outputs.skip != 'true'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-bench-${{ env.CMAKE_BUILD_TYPE }}

      - name: Configure C++ build
        # Pin the CPU baseline to x86-64-v3 (AVX2/FMA, ~2015+) instead of
        # the default `-march=native`. GitHub-hosted runners draw from a
        # heterogeneous pool; native tuning on one host can emit
        # instructions the next runner's CPU rejects (SIGILL). A fixed
        # baseline also makes day-to-day timings more comparable.
        if: steps.cpu_check.outputs.skip != 'true'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DCLIFFT_CPU_BASELINE=x86-64-v3

      - name: Build benchmark binary
        if: steps.cpu_check.outputs.skip != 'true'
        run: cmake --build build --target clifft_tests --parallel

      - name: Run Catch2 benchmarks
        # Action parser requires the console reporter (XML is not yet
        # supported by benchmark-action/github-action-benchmark@v1).
        if: steps.cpu_check.outputs.skip != 'true'
        run: |
          build/tests/clifft_tests "[bench]" \
            --reporter console \
            --out cpp-bench.txt

      - name: Publish to gh-pages
        if: steps.cpu_check.outputs.skip != 'true'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: C++ Catch2 benchmarks
          tool: catch2
          output-file-path: cpp-bench.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: bench/cpp
          auto-push: true
          # Record-only mode: alerts and comments are out of scope per #38.
          alert-threshold: '200%'
          fail-on-alert: false
          comment-on-alert: false

  bench-python:
    # Wait for bench-cpp before pushing so the two jobs don't race each
    # other on gh-pages. `always() && !cancelled()` keeps the "a C++
    # failure doesn't gate Python history" property intact (Python runs
    # even if bench-cpp failed) while honoring explicit workflow
    # cancellation -- a bare `always()` would publish data even on a
    # cancelled run.
    needs: bench-cpp
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-bench-python

      - name: Setup uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install Python package
        env:
          SKBUILD_CMAKE_BUILD_TYPE: Release
        run: uv pip install -e ".[dev]"

      - name: Run pytest-benchmark suite
        run: |
          uv run pytest tools/bench/ \
            --benchmark-only \
            --benchmark-json=python-bench.json

      - name: Publish to gh-pages
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Python pytest-benchmark suite
          tool: pytest
          output-file-path: python-bench.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: bench/python
          auto-push: true
          alert-threshold: '200%'
          fail-on-alert: false
          comment-on-alert: false
