name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Wasm module
        uses: ./.github/actions/build-wasm

      - name: Copy Wasm artifacts
        run: |
          mkdir -p playground/public
          cp build-wasm/clifft_wasm.js playground/public/
          cp build-wasm/clifft_wasm.wasm playground/public/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: playground/package-lock.json

      - name: Build playground
        run: |
          cd playground && npm ci
          VITE_BASE_PATH=/clifft/dev/playground/ VITE_BUILD_SHA=${{ github.sha }} npm run build

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Stage playground inside docs tree
        run: |
          rm -rf docs/playground
          cp -r playground/dist docs/playground

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy dev docs
        run: uv run --only-group docs mike deploy --push dev
        env:
          SITE_URL: https://unitaryfoundation.github.io/clifft/dev/
