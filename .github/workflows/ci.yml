name: CI

on:
  push:
    branches: [main]
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'playground/**'
      - '*.md'
      - '.github/workflows/docs.yml'
      - '.github/workflows/pr_preview.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  wasm:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Wasm module
        uses: ./.github/actions/build-wasm

      - name: Run Wasm smoke tests
        run: |
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            emscripten/emsdk:3.1.74 \
            node --experimental-vm-modules src/wasm/test_wasm.mjs

  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Check uv lockfile
        run: uv lock --check

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-

      - name: Run pre-commit
        run: uv tool run pre-commit run --all-files

  playground-lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: playground/package-lock.json

      - name: Install dependencies
        run: cd playground && npm ci

      - name: TypeScript type check
        run: cd playground && npx tsc -b

      - name: ESLint
        run: cd playground && npm run lint

  build-and-test:
    needs: lint
    runs-on: ubuntu-24.04
    env:
      CMAKE_BUILD_TYPE: Debug
      SKBUILD_CMAKE_BUILD_TYPE: Debug
      CLIFFT_CPU_BASELINE: x86-64-v2
      CMAKE_GENERATOR: Ninja
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-${{ env.CMAKE_BUILD_TYPE }}-${{ env.CLIFFT_CPU_BASELINE }}

      - name: Setup uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Configure C++ build
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DCLIFFT_CPU_BASELINE=${{ env.CLIFFT_CPU_BASELINE }}

      - name: Build C++
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --parallel

      - name: Audit build flags
        run: |
          python3 tools/ci/audit_build_flags.py \
            --compile-commands build/compile_commands.json

      - name: Check AVX2 kernel CPU flags
        id: avx2_check
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          flags = set()
          for line in Path("/proc/cpuinfo").read_text().splitlines():
              if line.startswith("flags"):
                  flags = set(line.split(":", 1)[1].split())
                  break

          required = [{"avx2"}, {"bmi2"}, {"fma"}]
          missing = ["|".join(sorted(g)) for g in required if not (g & flags)]
          supported = not missing
          if missing:
              print(f"::notice::Skipping forced AVX2 tests; missing CPU flags: {' '.join(missing)}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"supported={str(supported).lower()}\n")
          PY

      - name: Run C++ tests (default ISA)
        run: |
          ctest --test-dir build \
            --build-config ${{ env.CMAKE_BUILD_TYPE }} \
            --output-on-failure \
            --parallel \
            --timeout 300 \
            -E "Bench"
        shell: bash

      - name: Run C++ tests (scalar ISA)
        env:
          CLIFFT_FORCE_ISA: scalar
        run: |
          ctest --test-dir build \
            --build-config ${{ env.CMAKE_BUILD_TYPE }} \
            --output-on-failure \
            --parallel \
            --timeout 300 \
            -E "Bench"
        shell: bash

      - name: Run C++ tests (avx2 ISA)
        if: steps.avx2_check.outputs.supported == 'true'
        env:
          CLIFFT_FORCE_ISA: avx2
        run: |
          ctest --test-dir build \
            --build-config ${{ env.CMAKE_BUILD_TYPE }} \
            --output-on-failure \
            --parallel \
            --timeout 300 \
            -E "Bench"
        shell: bash

      - name: Install Python package
        run: uv sync --locked

      - name: Audit Python extension exports
        run: uv run python tools/ci/audit_python_exports.py

      - name: Run Python tests (default ISA)
        run: uv run --locked pytest tests/python/ -v

      - name: Run Python tests (scalar ISA)
        env:
          CLIFFT_FORCE_ISA: scalar
        run: uv run --locked pytest tests/python/ -v

      - name: Test documentation code examples
        run: uv run --locked pytest --codeblocks docs/ README.md -v

  release-cpp-smoke:
    needs: lint
    runs-on: ubuntu-24.04
    env:
      CMAKE_BUILD_TYPE: Release
      CLIFFT_CPU_BASELINE: x86-64-v2
      CMAKE_GENERATOR: Ninja
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-${{ env.CMAKE_BUILD_TYPE }}-${{ env.CLIFFT_CPU_BASELINE }}

      - name: Configure C++ build
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DCLIFFT_CPU_BASELINE=${{ env.CLIFFT_CPU_BASELINE }}

      - name: Build C++ tests
        run: cmake --build build --target clifft_tests --parallel

      - name: Audit release-like build flags
        run: |
          python3 tools/ci/audit_build_flags.py \
            --compile-commands build/compile_commands.json

      - name: Run C++ smoke tests
        run: |
          ctest --test-dir build \
            --build-config ${{ env.CMAKE_BUILD_TYPE }} \
            --output-on-failure \
            --parallel \
            --timeout 300 \
            -E "Bench"
        shell: bash

      - name: Setup uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install Python package (release baseline)
        env:
          SKBUILD_CMAKE_BUILD_TYPE: Release
        run: |
          uv venv .smoke-venv
          . .smoke-venv/bin/activate
          uv sync --locked --active --no-dev

      - name: Audit Python extension exports
        run: .smoke-venv/bin/python tools/ci/audit_python_exports.py

      - name: Install qemu-user
        run: sudo apt-get install -y qemu-user

      # Run a small QEMU-emulated CPU matrix against the release-baseline
      # Python install. Catches AVX-512 leakage into the AVX-2 dispatch
      # path (would SIGILL the emulated CPU) and validates that
      # CLIFFT_FORCE_ISA traps fire cleanly on incompatible hosts.
      - name: QEMU smoke -- Haswell (auto-detect)
        run: PYTHON=$(pwd)/.smoke-venv/bin/python .github/scripts/wheel_smoke.sh Haswell auto pass
      - name: QEMU smoke -- Haswell + FORCE_ISA=avx2
        run: PYTHON=$(pwd)/.smoke-venv/bin/python .github/scripts/wheel_smoke.sh Haswell avx2 pass
      - name: QEMU smoke -- Haswell + FORCE_ISA=avx512 (clean trap)
        run: PYTHON=$(pwd)/.smoke-venv/bin/python .github/scripts/wheel_smoke.sh Haswell avx512 fail
      - name: QEMU smoke -- Nehalem (auto-detect)
        run: PYTHON=$(pwd)/.smoke-venv/bin/python .github/scripts/wheel_smoke.sh Nehalem auto pass
      - name: QEMU smoke -- Nehalem + FORCE_ISA=avx2 (clean trap)
        run: PYTHON=$(pwd)/.smoke-venv/bin/python .github/scripts/wheel_smoke.sh Nehalem avx2 fail

  cross-platform:
    if: github.event_name == 'push'
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            install-deps: brew install ninja libomp
          - os: windows-latest
            install-deps: ""
    runs-on: ${{ matrix.os }}
    env:
      CMAKE_BUILD_TYPE: Debug
      SKBUILD_CMAKE_BUILD_TYPE: Debug
      CLIFFT_CPU_BASELINE: generic
      CMAKE_GENERATOR: Ninja
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        if: matrix.install-deps != ''
        run: ${{ matrix.install-deps }}

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-${{ env.CMAKE_BUILD_TYPE }}-${{ env.CLIFFT_CPU_BASELINE }}

      - name: Setup uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Setup MSVC dev environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure C++ build
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} -DCLIFFT_CPU_BASELINE=${{ env.CLIFFT_CPU_BASELINE }}

      - name: Build C++
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --parallel

      - name: Show ccache verbose stats
        if: runner.os == 'Windows'
        run: ccache -sv

      - name: Run C++ tests (skip benchmarks on cross-platform)
        run: |
          ctest --test-dir build \
            --build-config ${{ env.CMAKE_BUILD_TYPE }} \
            --output-on-failure \
            --parallel \
            --timeout 300 \
            -E "Bench"
        shell: bash

      - name: Install Python package
        run: uv sync --locked

      - name: Audit Python extension exports
        run: uv run python tools/ci/audit_python_exports.py

      - name: Run Python tests
        run: uv run --locked pytest tests/python/ -v
