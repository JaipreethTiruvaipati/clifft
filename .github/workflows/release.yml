name: Release

# Trigger on version tags (e.g., v0.1.0, v1.2.3)
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    # Manual dispatch always publishes to TestPyPI only.
    # PyPI publishing requires a version tag push.
    inputs:
      test_version:
        description: "Version for TestPyPI (e.g. 0.1.0.dev1). Required because PyPI rejects local version specifiers from untagged builds."
        required: true
        default: "0.1.0.dev1"

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------
  # Build sdist (source distribution)
  # -----------------------------------------------------------
  sdist:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for setuptools-scm

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: uv build --sdist
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.test_version || '' }}

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # -----------------------------------------------------------
  # Build wheels via cibuildwheel
  # -----------------------------------------------------------
  wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
            cibw_archs: x86_64
            cpu_baseline: x86-64-v2
          - os: ubuntu-24.04-arm
            arch: aarch64
            cibw_archs: aarch64
            cpu_baseline: generic
          - os: macos-14
            arch: arm64
            cibw_archs: arm64
            cpu_baseline: generic
            cibw_environment: MACOSX_DEPLOYMENT_TARGET=14.0
          - os: windows-latest
            arch: amd64
            cibw_archs: AMD64
            cpu_baseline: generic
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for setuptools-scm

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "cp312-*"
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_SKIP: "*-musllinux*"
          # manylinux_2_28 (AlmaLinux 8, GCC 12) supports the explicit
          # x86-64 baseline flags used for Linux wheels.
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_ENVIRONMENT: >-
            CLIFFT_CPU_BASELINE=${{ matrix.cpu_baseline }}
            ${{ matrix.cibw_environment || '' }}
            ${{ inputs.test_version && format('SETUPTOOLS_SCM_PRETEND_VERSION={0}', inputs.test_version) || '' }}
          # Install build dependencies inside the cibuildwheel container
          CIBW_BEFORE_BUILD: pip install setuptools-scm
          # Install libomp on macOS for OpenMP support in wheels
          CIBW_BEFORE_ALL_MACOS: brew install libomp
          # Smoke-test: import the built package and audit exported symbols
          CIBW_TEST_COMMAND: >-
            python -c "import clifft; print(clifft.__version__); print(clifft.CPU_BASELINE); print(clifft.svm_backend())"
            &&
            python {project}/tools/ci/audit_python_exports.py

      # QEMU smoke against the just-built Linux x86_64 wheel. Catches
      # AVX-512 leakage into the AVX-2 dispatch path (would SIGILL the
      # emulated sub-AVX-512 CPU) and validates CLIFFT_FORCE_ISA traps
      # on the wheel that will actually be published. Skipped on other
      # arches/OSes since QEMU user-mode is x86_64-specific and the
      # other matrix entries use the generic baseline.
      - name: Install qemu-user (Linux x86_64 wheel only)
        if: matrix.os == 'ubuntu-24.04' && matrix.arch == 'x86_64'
        run: sudo apt-get update && sudo apt-get install -y qemu-user

      - name: Smoke-install the built wheel
        if: matrix.os == 'ubuntu-24.04' && matrix.arch == 'x86_64'
        run: |
          python3 -m venv .smoke-venv
          .smoke-venv/bin/python -m pip install -U pip
          .smoke-venv/bin/python -m pip install wheelhouse/*.whl

      - name: QEMU smoke -- Haswell (auto-detect)
        if: matrix.os == 'ubuntu-24.04' && matrix.arch == 'x86_64'
        run: PYTHON=$(pwd)/.smoke-venv/bin/python .github/scripts/wheel_smoke.sh Haswell auto pass
      - name: QEMU smoke -- Haswell + FORCE_ISA=avx2
        if: matrix.os == 'ubuntu-24.04' && matrix.arch == 'x86_64'
        run: PYTHON=$(pwd)/.smoke-venv/bin/python .github/scripts/wheel_smoke.sh Haswell avx2 pass
      - name: QEMU smoke -- Haswell + FORCE_ISA=avx512 (clean trap)
        if: matrix.os == 'ubuntu-24.04' && matrix.arch == 'x86_64'
        run: PYTHON=$(pwd)/.smoke-venv/bin/python .github/scripts/wheel_smoke.sh Haswell avx512 fail
      - name: QEMU smoke -- Nehalem (auto-detect)
        if: matrix.os == 'ubuntu-24.04' && matrix.arch == 'x86_64'
        run: PYTHON=$(pwd)/.smoke-venv/bin/python .github/scripts/wheel_smoke.sh Nehalem auto pass
      - name: QEMU smoke -- Nehalem + FORCE_ISA=avx2 (clean trap)
        if: matrix.os == 'ubuntu-24.04' && matrix.arch == 'x86_64'
        run: PYTHON=$(pwd)/.smoke-venv/bin/python .github/scripts/wheel_smoke.sh Nehalem avx2 fail

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  # -----------------------------------------------------------
  # Publish to TestPyPI (on tag push, before PyPI)
  # -----------------------------------------------------------
  publish-testpypi:
    needs: [sdist, wheels]
    runs-on: ubuntu-24.04
    environment: testpypi
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # -----------------------------------------------------------
  # Publish to PyPI (only on tag push, after TestPyPI)
  # -----------------------------------------------------------
  publish-pypi:
    needs: [publish-testpypi]
    # Only publish to PyPI on tag pushes — never on manual dispatch.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # -----------------------------------------------------------
  # Create GitHub Release (only on tag push, after PyPI)
  # -----------------------------------------------------------
  github-release:
    needs: [publish-pypi]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG.md
        run: |
          # Extract the section for this version from the committed changelog.
          # Matches from "## [X.Y.Z]" to the next "## [" or end of file.
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if ($0 ~ "^## \\[" ver "\\]") found=1; next }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No entry found for $VERSION in CHANGELOG.md, using tag message." >&2
            echo "Release $VERSION" > RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md

  # -----------------------------------------------------------
  # Publish versioned documentation and playground
  # -----------------------------------------------------------
  publish-docs:
    needs: [github-release]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    concurrency:
      group: docs-deploy
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Wasm module
        uses: ./.github/actions/build-wasm

      - name: Copy Wasm artifacts
        run: |
          mkdir -p playground/public
          cp build-wasm/clifft_wasm.js playground/public/
          cp build-wasm/clifft_wasm.wasm playground/public/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: playground/package-lock.json

      - name: Install playground dependencies
        run: cd playground && npm ci

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install clifft and docs deps
        run: uv sync --locked --group docs

      - name: Build versioned playground
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd playground
          VITE_BASE_PATH="/clifft/${VERSION}/playground/" VITE_BUILD_SHA="${GITHUB_SHA}" npm run build

      - name: Stage playground inside docs tree
        run: |
          rm -rf docs/playground
          cp -r playground/dist docs/playground

      - name: Deploy versioned docs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SITE_URL="https://unitaryfoundation.github.io/clifft/${VERSION}/" \
            uv run --locked --group docs mike deploy --push "${VERSION}"

      - name: Decide whether to update stable docs
        id: stable
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          uv run --locked --group docs mike list --json > /tmp/mike-list.json || echo '[]' > /tmp/mike-list.json
          VERSION="${VERSION}" uv run --locked --group docs python - <<'PY' >> "${GITHUB_OUTPUT}"
          import json
          import os
          from pathlib import Path

          from packaging.version import InvalidVersion, Version

          current = Version(os.environ["VERSION"])
          entries = json.loads(Path("/tmp/mike-list.json").read_text())
          released = []
          for entry in entries:
              try:
                  released.append(Version(entry["version"]))
              except (InvalidVersion, KeyError):
                  continue

          highest = max(released, default=None)
          should_update = highest is None or current >= highest
          print(f"update={'true' if should_update else 'false'}")
          print(f"highest={highest or ''}")
          PY

      - name: Build stable playground
        if: steps.stable.outputs.update == 'true'
        run: |
          cd playground
          VITE_BASE_PATH=/clifft/stable/playground/ VITE_BUILD_SHA="${GITHUB_SHA}" npm run build

      - name: Stage stable playground inside docs tree
        if: steps.stable.outputs.update == 'true'
        run: |
          rm -rf docs/playground
          cp -r playground/dist docs/playground

      - name: Deploy stable docs
        if: steps.stable.outputs.update == 'true'
        run: |
          SITE_URL=https://unitaryfoundation.github.io/clifft/stable/ \
            uv run --locked --group docs mike deploy --push stable
          uv run --locked --group docs mike set-default --push stable

      - name: Build root stable playground
        if: steps.stable.outputs.update == 'true'
        run: |
          cd playground
          VITE_BASE_PATH=/clifft/playground/ VITE_BUILD_SHA="${GITHUB_SHA}" npm run build

      - name: Deploy root stable playground
        if: steps.stable.outputs.update == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playground/dist
          destination_dir: playground
          keep_files: true
